# Docker Compose Override for cBioPortal Navigator Integration
# This file extends the main docker-compose.yml to add the Navigator service
#
# Usage:
#   1. Copy to LibreChat directory: cp docker-compose.example.yml /path/to/LibreChat/docker-compose.override.yml
#   2. Check Navigator image tag matches your desired branch (see comment below)
#   3. Ensure LibreChat .env has: ANTHROPIC_API_KEY, GOOGLE_KEY, OPENAI_API_KEY
#   4. Run: docker compose up -d

services:
  # Add cBioPortal Navigator service to LibreChat's network
  cbioportal-navigator:
    # Use pre-built GitHub image
    # IMPORTANT: Check available branches/tags at:
    # https://github.com/fuzhaoyuan/cbioportal-navigator/pkgs/container/cbioportal-navigator
    image: ghcr.io/fuzhaoyuan/cbioportal-navigator:master-studyview-url-shortened-chat-completions

    # Or build from local source:
    # build:
    #   context: ../cbioportal-navigator
    #   dockerfile: Dockerfile

    container_name: cbioportal-navigator
    ports:
      - "8002:8002"  # Expose for debugging/testing
    environment:
      - MCP_TRANSPORT=http
      - PORT=8002
      - CBIOPORTAL_BASE_URL=https://www.cbioportal.org
      # Pass API keys from LibreChat .env to Navigator
      # Navigator will use these for AI provider authentication
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - default

  # Update LibreChat service to mount the config file
  api:
    volumes:
      - ./librechat.yaml:/app/librechat.yaml:ro
