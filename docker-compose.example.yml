# Docker Compose for cBioPortal Navigator as MCP Server
# Run this navigator as a standalone MCP server that other agents can connect to
#
# Usage:
#   docker compose -f docker-compose.mcp.yml up -d
#
# The MCP server will be available at:
#   http://localhost:8002/mcp

services:
  cbioportal-navigator:
    # Use pre-built image
    image: ghcr.io/fuzhaoyuan/cbioportal-navigator:master-studyview-url-shortened-chat-completions

    # Or build from local source:
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: cbioportal-navigator

    environment:
      # MCP server configuration
      - MCP_TRANSPORT=http
      - PORT=8002

      # cBioPortal configuration
#      - CBIOPORTAL_BASE_URL=https://www.cbioportal.org
      - CBIOPORTAL_BASE_URL=https://deploy-preview-5312--cbioportalfrontend.netlify.app

    ports:
      - "8002:8002"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
