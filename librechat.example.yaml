# LibreChat Configuration for cBioPortal Navigator
# Documentation: https://www.librechat.ai/docs/configuration/librechat_yaml
#
# Usage:
#   1. Copy to LibreChat directory: cp librechat.example.yaml /path/to/LibreChat/librechat.yaml
#   2. Adjust version if needed (check LibreChat changelog)
#   3. Ensure .env has: ANTHROPIC_API_KEY, GOOGLE_KEY, OPENAI_API_KEY

version: 1.2.1

# Cache settings
cache: true

# Custom interface configuration
interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true

# Definition of custom endpoints
endpoints:
  custom:
    # cBioPortal Navigator Chat Completions Endpoint
    - name: 'cBioPortal Navigator'
      # API key placeholder (Navigator ignores this and uses environment variables)
      # Required by LibreChat but not used by Navigator
      apiKey: 'dummy'

      # Navigator service URL (using Docker service name)
      baseURL: 'http://cbioportal-navigator:8002/v1'

      # Available models (using auto-updating aliases)
      models:
        default:
          - 'claude-sonnet-4-5'   # Anthropic - latest Sonnet
          - 'claude-opus-4-5'     # Anthropic - latest Opus
          - 'gemini-2.0-flash'    # Google - latest Flash
          - 'gpt-4o'              # OpenAI - recommended model
        # Automatically fetch models from /v1/models endpoint
        fetch: true

      # Enable automatic conversation titles using Claude
      titleConvo: true
      titleModel: 'claude-sonnet-4-5'

      # Display label in LibreChat UI
      modelDisplayLabel: 'cBioPortal Navigator'

      # Drop incompatible parameters (none needed for now)
      dropParams: []

      # Optional: Add custom icon
      # iconURL: 'https://example.com/icon.png'

# MCP Server domain restrictions (for development)
mcpSettings:
  allowedDomains:
    - 'host.docker.internal'
    - 'localhost'
